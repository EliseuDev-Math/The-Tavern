<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirecionando...</title>
  <script>
    // Redireciona rotas da SPA de volta para o index.html
    // ⚠️ Deve ser o mesmo valor do base no vite.config.ts
    var base = '/The-Tavern';
    var path = window.location.pathname.slice(base.length) || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = base + '/?r=' + encodeURIComponent(path + search) + hash;
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
